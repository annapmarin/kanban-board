<!DOCTYPE html>
<html lang="ca" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban DAW06</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Estils personalitzats -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Script -->
    <script type="module" src="js/script.js"></script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 shadow-md">
        <div class="max-w-screen-xl mx-auto flex flex-wrap items-center justify-between gap-4">

            <!-- Títol -->
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-semibold tracking-tight">
                    Kanban <span class="text-indigo-400">Anna Prats Marín</span>
                </h1>
            </div>

            <!-- Estadístiques -->
            <div class="flex items-center gap-4 text-sm text-slate-400">
                <span>Total: <strong id="stat-total" class="text-slate-100">0</strong></span>
                <span>Per fer: <strong id="stat-perfer" class="text-slate-100">0</strong></span>
                <span>En curs: <strong id="stat-encurs" class="text-indigo-400">0</strong></span>
                <span>Fet: <strong id="stat-fet" class="text-green-400">0</strong></span>
            </div>

            <!-- Botó nova tasca -->
            <button id="btn-nova-tasca"
                class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer">
                + Nova tasca
            </button>

        </div>
    </header>

    <div class="flex flex-1 max-w-screen-xl mx-auto w-full gap-6 p-6">

        <aside class="w-80 shrink-0">

            <!-- Formulari -->
            <section id="formulari-panel"
                class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">

                <div class="flex items-center justify-between px-5 py-4 border-b border-slate-700">
                    <h2 id="form-titol" class="text-base font-semibold">Nova tasca</h2>
                    <button id="btn-tancar-form" aria-label="Tancar formulari"
                        class="text-slate-400 hover:text-slate-100 text-lg leading-none cursor-pointer transition-colors">✕</button>
                </div>

                <form id="formulari-tasca" novalidate class="p-5 flex flex-col gap-4">

                    <!-- ID -->
                    <input type="hidden" id="camp-id" />

                    <!-- Títol -->
                    <div class="flex flex-col gap-1">
                        <label for="camp-titol" class="text-sm font-medium text-slate-300">
                            Títol <span class="text-red-400">*</span>
                        </label>
                        <input type="text" id="camp-titol" placeholder="Nom de la tasca" required autocomplete="off"
                            class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
                        <span id="error-titol" class="text-xs text-red-400 hidden">El títol és obligatori</span>
                    </div>

                    <!-- Descripció -->
                    <div class="flex flex-col gap-1">
                        <label for="camp-descripcio" class="text-sm font-medium text-slate-300">Descripció</label>
                        <textarea id="camp-descripcio" rows="3" placeholder="Detalls de la tasca (opcional)"
                            class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
                    </div>

                    <!-- Prioritat -->
                    <div class="flex flex-col gap-1">
                        <label for="camp-prioritat" class="text-sm font-medium text-slate-300">Prioritat</label>
                        <select id="camp-prioritat"
                            class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                            <option value="baixa">🟢 Baixa</option>
                            <option value="mitjana">🟡 Mitjana</option>
                            <option value="alta">🔴 Alta</option>
                        </select>
                    </div>

                    <!-- Data de venciment -->
                    <div class="flex flex-col gap-1">
                        <label for="camp-data" class="text-sm font-medium text-slate-300">Data límit</label>
                        <input type="date" id="camp-data"
                            class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer" />
                    </div>

                    <!-- Estat -->
                    <div class="flex flex-col gap-1">
                        <label for="camp-estat" class="text-sm font-medium text-slate-300">Estat inicial</label>
                        <select id="camp-estat"
                            class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                            <option value="perFer">Per fer</option>
                            <option value="enCurs">En curs</option>
                            <option value="fet">Fet</option>
                        </select>
                    </div>

                    <!-- Botons -->
                    <div class="flex gap-2 pt-1">
                        <button type="submit" id="btn-submit"
                            class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded-lg transition-colors cursor-pointer">
                            Afegir tasca
                        </button>
                        <button type="button" id="btn-cancelar"
                            class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-medium py-2 rounded-lg transition-colors cursor-pointer">
                            Cancel·lar
                        </button>
                    </div>

                </form>
            </section>

        </aside>

        <main class="flex-1 flex flex-col gap-4 min-w-0">

            <!-- Filtres i cerca -->
            <section id="zona-filtres" aria-label="Filtres i cerca" class="flex flex-wrap gap-3">
                <input type="search" id="cerca-text" placeholder="Cercar tasques..."
                    class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 flex-1 min-w-40" />
                <select id="filtre-estat" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">Tots els estats</option>
                    <option value="perFer">Per fer</option>
                    <option value="enCurs">En curs</option>
                    <option value="fet">Fet</option>
                </select>
                <select id="filtre-prioritat" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">Totes les prioritats</option>
                    <option value="alta">🔴 Alta</option>
                    <option value="mitjana">🟡 Mitjana</option>
                    <option value="baixa">🟢 Baixa</option>
                </select>
            </section>

            <!-- TAULER KANBAN -->
            <section id="tauler" aria-label="Tauler Kanban" class="flex gap-4 flex-1 items-start">

                <!-- Columna: Per fer -->
                <div class="columna-drop flex-1 bg-slate-800 rounded-xl border border-slate-700 flex flex-col min-h-96"
                    data-estat="perFer">
                    <header class="flex items-center justify-between px-4 py-3 border-b border-slate-700">
                        <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">Per fer</h2>
                        <span id="comp-perfer"
                            class="bg-slate-700 text-slate-300 text-xs font-medium px-2 py-0.5 rounded-full">0</span>
                    </header>
                    <div id="columna-perfer" class="flex flex-col gap-3 p-3 flex-1"></div>
                </div>

                <!-- Columna: En curs -->
                <div class="columna-drop flex-1 bg-slate-800 rounded-xl border border-slate-700 flex flex-col min-h-96"
                    data-estat="enCurs">
                    <header class="flex items-center justify-between px-4 py-3 border-b border-slate-700">
                        <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-wide">En curs</h2>
                        <span id="comp-encurs"
                            class="bg-indigo-900 text-indigo-300 text-xs font-medium px-2 py-0.5 rounded-full">0</span>
                    </header>
                    <div id="columna-encurs" class="flex flex-col gap-3 p-3 flex-1"></div>
                </div>

                <!-- Columna: Fet -->
                <div class="columna-drop flex-1 bg-slate-800 rounded-xl border border-slate-700 flex flex-col min-h-96"
                    data-estat="fet">
                    <header class="flex items-center justify-between px-4 py-3 border-b border-slate-700">
                        <h2 class="text-sm font-semibold text-green-400 uppercase tracking-wide">Fet</h2>
                        <span id="comp-fet"
                            class="bg-green-900 text-green-300 text-xs font-medium px-2 py-0.5 rounded-full">0</span>
                    </header>
                    <div id="columna-fet" class="flex flex-col gap-3 p-3 flex-1"></div>
                </div>

            </section>

        </main>

    </div>

    <!-- FOOTER -->
    <footer class="bg-slate-800 border-t border-slate-700 px-6 py-3 text-center text-xs text-slate-500">
        Kanban DAW06 ·
        <a href="https://github.com/annapmarin/kanban-board" target="_blank" rel="noopener"
            class="text-indigo-400 hover:text-indigo-300 transition-colors">GitHub</a>
    </footer>

</body>

</html>
